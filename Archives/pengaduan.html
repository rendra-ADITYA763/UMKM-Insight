<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMKM Insight — Pusat Bantuan</title>
    <link rel="stylesheet" href="shared.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>tailwind.config={theme:{extend:{colors:{brand:{50:'#f0fdfa',100:'#ccfbf1',500:'#14b8a6',600:'#0d9488',700:'#0f766e'}}}}}</script>
    <style>
        body{display:flex;height:100vh;overflow:hidden;background:var(--surface);}
        .main-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;}
        .main-content{flex:1;overflow-y:auto;padding:24px;}
        .complaint-grid{display:grid;grid-template-columns:1fr 1.5fr;gap:24px;}
        @media(max-width:768px){.complaint-grid{grid-template-columns:1fr;}}
    </style>
</head>
<body>
    <div id="sidebar-container"></div>
    <div class="main-wrap">
        <div id="topbar-container"></div>
        <div class="main-content">
            <div class="animate-fade-in" style="margin-bottom:24px;">
                <h1 style="font-size:1.5rem;font-weight:800;color:var(--text-primary);">Pusat Bantuan & Pengaduan</h1>
                <p style="font-size:.8125rem;color:var(--text-secondary);margin-top:4px;">Ada kendala dengan data atau layanan? Tim operator kami siap membantu Anda.</p>
            </div>

            <div class="complaint-grid">
                <!-- Form Section -->
                <div class="card p-6 animate-fade-in delay-100">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><i class="ph ph-note-pencil text-brand-600"></i> Buat Laporan Baru</h2>
                    <form id="complaint-form" onsubmit="return handleComplaint(event)" class="flex flex-col gap-4">
                        <div class="form-group">
                            <label class="form-label">Subjek Pengaduan</label>
                            <input type="text" id="comp-subject" class="form-input" placeholder="e.g. Masalah Saldo, Error Dashboard">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Detail Keluhan</label>
                            <textarea id="comp-message" class="form-input" rows="5" placeholder="Ceritakan detail masalah yang Anda hadapi..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full"><i class="ph ph-paper-plane-tilt"></i> Kirim Pengaduan</button>
                    </form>
                </div>

                <!-- History Section -->
                <div class="card p-6 animate-fade-in delay-200">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><i class="ph ph-clock-counter-clockwise text-slate-500"></i> Riwayat Pengaduan</h2>
                    <div id="complaint-history" class="flex flex-col gap-4 max-h-[500px] overflow-y-auto pr-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="shared.js"></script>
    <script>
        const user = initPage('pengaduan', 'client');
        if(!user) throw new Error('Unauthorized');
        document.getElementById('sidebar-container').innerHTML = buildSidebar('pengaduan');
        document.getElementById('topbar-container').innerHTML = buildTopbar(user);

        function renderHistory() {
            const complaints = getComplaints().filter(c => c.userId === user.id).sort((a,b) => new Date(b.date) - new Date(a.date));
            const container = document.getElementById('complaint-history');
            
            if(!complaints.length) {
                container.innerHTML = '<div class="text-center py-10 text-slate-400"><i class="ph ph-chats text-4xl mb-2"></i><p class="text-sm">Belum ada riwayat pengaduan.</p></div>';
                return;
            }

            container.innerHTML = complaints.map(c => `
                <div class="p-4 rounded-xl border ${c.status === 'open' ? 'border-amber-100 bg-amber-50' : 'border-emerald-100 bg-emerald-50'}">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-bold text-sm text-slate-800">${c.subject}</h3>
                        <span class="badge ${c.status === 'open' ? 'badge-warning' : 'badge-success'}">${c.status.toUpperCase()}</span>
                    </div>
                    <p class="text-xs text-slate-600 mb-3">${c.message}</p>
                    <div class="flex justify-between items-center text-[10px] text-slate-400">
                        <span>${c.date}</span>
                        ${c.status === 'resolved' ? '<span class="text-emerald-600 font-bold">Diselesaikan oleh Operator</span>' : '<span>Sedang ditinjau</span>'}
                    </div>
                </div>
            `).join('');
        }

        function handleComplaint(e) {
            e.preventDefault();
            const subject = document.getElementById('comp-subject').value.trim();
            const message = document.getElementById('comp-message').value.trim();

            if(!subject || !message) return showToast('Subjek dan pesan wajib diisi', 'warning');

            const complaints = getComplaints();
            complaints.push({
                id: 'CMP-' + Date.now(),
                userId: user.id,
                subject: subject,
                message: message,
                status: 'open',
                date: new Date().toISOString().split('T')[0]
            });
            saveComplaints(complaints);
            
            document.getElementById('complaint-form').reset();
            showToast('Pengaduan Anda telah dikirim ke operator.', 'success');
            renderHistory();
            return false;
        }

        renderHistory();
    </script>
</body>
</html>
