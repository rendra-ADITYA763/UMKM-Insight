<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMKM Insight — Manajemen Tiket</title>
    <link rel="stylesheet" href="shared.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>tailwind.config={theme:{extend:{colors:{brand:{50:'#f0fdfa',100:'#ccfbf1',500:'#14b8a6',600:'#0d9488',700:'#0f766e'}}}}}</script>
    <style>
        body{display:flex;height:100vh;overflow:hidden;background:var(--surface);}
        .main-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;}
        .main-content{flex:1;overflow-y:auto;padding:24px;}
        .ticket-list{max-height:calc(100vh - 150px);overflow-y:auto;}
    </style>
</head>
<body>
    <div id="sidebar-container"></div>
    <div class="main-wrap">
        <div id="topbar-container"></div>
        <div class="main-content">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h1 style="font-size:1.5rem;font-weight:800;color:var(--text-primary);">Manajemen Tiket Bantuan</h1>
                    <p style="font-size:.8125rem;color:var(--text-secondary);margin-top:4px;">Tanggapi dan selesaikan keluhan pengguna untuk menjaga kualitas layanan.</p>
                </div>
                <div class="flex gap-2">
                    <button class="btn btn-outline btn-sm" onclick="filterTickets('all')">Semua</button>
                    <button class="btn btn-outline btn-sm" onclick="filterTickets('open')">Terbuka</button>
                    <button class="btn btn-outline btn-sm" onclick="filterTickets('resolved')">Selesai</button>
                </div>
            </div>

            <div class="card p-0 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="data-table">
                        <thead class="bg-slate-50">
                            <tr>
                                <th class="w-20">ID</th>
                                <th>UMKM / Pengguna</th>
                                <th>Subjek & Pesan</th>
                                <th>Tanggal</th>
                                <th>Status</th>
                                <th class="text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="ticket-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="shared.js"></script>
    <script>
        const user = initPage('pengaduan-admin', 'operator');
        if(!user) throw new Error('Unauthorized');
        document.getElementById('sidebar-container').innerHTML = buildSidebar('pengaduan-admin');
        document.getElementById('topbar-container').innerHTML = buildTopbar(user);

        let currentFilter = 'all';

        function renderTickets() {
            const allTickets = getComplaints();
            const users = getUsers();
            const container = document.getElementById('ticket-body');
            
            let filtered = allTickets;
            if(currentFilter !== 'all') filtered = allTickets.filter(t => t.status === currentFilter);
            
            filtered.sort((a,b) => new Date(b.date) - new Date(a.date));

            if(!filtered.length) {
                container.innerHTML = '<tr><td colspan="6" class="text-center py-20 text-slate-400">Tidak ada tiket ditemukan.</td></tr>';
                return;
            }

            container.innerHTML = filtered.map(t => {
                const client = users.find(u => u.id === t.userId);
                return `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="font-mono text-[10px] text-slate-400">${t.id}</td>
                        <td>
                            <div class="font-bold text-sm">${client ? client.bisnis : 'Unknown'}</div>
                            <div class="text-[10px] text-slate-400">${client ? client.nama : '-'}</div>
                        </td>
                        <td class="max-w-xs">
                            <div class="font-bold text-sm text-slate-700">${t.subject}</div>
                            <div class="text-xs text-slate-500 line-clamp-1">${t.message}</div>
                        </td>
                        <td class="text-xs text-slate-500">${t.date}</td>
                        <td><span class="badge ${t.status === 'open' ? 'badge-warning' : 'badge-success'}">${t.status.toUpperCase()}</span></td>
                        <td class="text-center">
                            ${t.status === 'open' ? 
                                `<button class="btn btn-primary btn-sm px-4" onclick="resolveTicket('${t.id}')">Selesaikan</button>` : 
                                `<span class="text-[10px] text-emerald-600 font-bold"><i class="ph ph-check-circle"></i> Resolved</span>`
                            }
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function filterTickets(status) {
            currentFilter = status;
            renderTickets();
        }

        function resolveTicket(ticketId) {
            const tickets = getComplaints();
            const idx = tickets.findIndex(t => t.id === ticketId);
            if(idx < 0) return;

            tickets[idx].status = 'resolved';
            saveComplaints(tickets);

            // Notify user
            const notifs = getNotifications();
            notifs.push({
                id: 'N-' + Date.now(),
                targetUserId: tickets[idx].userId,
                type: 'auto',
                title: 'Pengaduan Selesai',
                message: `Laporan Anda "${tickets[idx].subject}" telah diselesaikan oleh tim operator kami.`,
                date: new Date().toISOString().split('T')[0],
                read: false
            });
            saveNotifications(notifs);

            showToast('Tiket berhasil diselesaikan dan user telah dinotifikasi', 'success');
            renderTickets();
        }

        renderTickets();
    </script>
</body>
</html>
